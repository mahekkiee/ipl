<!DOCTYPE html>
<html>
<head>
<title>IPL Auction</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>IPL Auction Platform</h1>

<div id="auth">

<h3>Register</h3>
<input id="reg-user" placeholder="username">
<input id="reg-pass" type="password" placeholder="password">
<button onclick="register()">Register</button>

<h3>Login</h3>
<input id="log-user" placeholder="username">
<input id="log-pass" type="password" placeholder="password">
<button onclick="login()">Login</button>

</div>

<hr>

<select id="filter">
<option value="all">All Players</option>
<option value="Indian">Indian</option>
<option value="Overseas">Overseas</option>
</select>

<div class="container" id="players"></div>

<script src="/script.js"></script>

</body>
</html>
